<body>
    <main>
        <header>
            <h1>Portfólio</h1>
            <nav class="nav-link">
                <a href="../index.html">Home</a>
                <a href="../html/sobre.html">Sobre</a>
                <a href="../html/projetos.html">Projetos</a>
                <a class="linkAtivo" href="../html/contato.html">Contato</a>
            </nav>
        </header>

        <div class="cabecalho-contato">
            <h1>
                Entre em Contato
            </h1>

            <p>Tem algum projeto em mente? Vamos conversar
                e transformar suas ideias em realidade!</p>
        </div>


        <div class="container-div-contato">

            <section class="container-div-esquerdo">

                <h2>Informações de Contato</h2>
                <div class="div-email">
                    <img src="../../assets/icone-carta.png" alt="Email Icon">
                    <p class="paragrafo-email"><strong>Email</strong>
                        <br>
                        <a class="link-email" target="_blank"
                            href="mailto:lucasvcantarellidev@gmail.com">lucasvcantarellidev@gmail.com</a>
                    </p>
                </div>

                <div class="div-telefone">
                    <img src="../../assets/icone-telefone.png" alt="Telefone Icon">
                    <p class="paragrafo-telefone"><strong>Telefone</strong>
                        <br>
                        <a class="link-telefone" target="_blank" href="tel:+5581996411639">+55 (81) 99641-1639</a>
                    </p>
                </div>

                <div class="div-localizacao">
                    <img src="../../assets/icone-localizacao.webp" alt="Localização Icon">
                    <p class="paragrafo-localizacao"><strong>Localização</strong>
                       <br>
                       <a class="link-localizacao"> Recife, PE - Brasil</a>
                    </p>
                </div>
            </section>

            <section class="container-div-direito">

                <h2>Envie uma mensagem</h2>
                <form>
                    <label for="nome">Nome</label>
                    <input class="nome-input" name="nome" type="text" placeholder="Seu nome completo" required>
                   
                    <label for="email">Email</label>
                    <input class="email-input" name="email" type="email" placeholder="seu@email.com" required>

                    <label for="mensagem">Mensagem</label>
                    <textarea class="mensagem-textarea" name="mensagem"  placeholder="Conte-me sobre o seu projeto..." required></textarea>
                   
                    <button class="button-enviar" type="submit">
                        Enviar Mensagem 
                        <img src="../../assets/icone-enviar-mensagem.png" alt="Enviar Mensagem Icon">
                    </button>
                </form>


            </section>

                    <a class="button-whats" href="https://wa.me/5581996411639?text=Gostaria de saber mais sobre os sites!"
            target="_blank">
            <img src="../../assets/icone-whats.png" alt="WhatsApp">
        </a>


        </div>
    </main>
